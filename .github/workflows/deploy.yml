name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test

  deploy-pages:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:pages
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-itch:
    needs: verify
    if: ${{ vars.ITCH_TARGET != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:itch
      - name: Install butler
        run: |
          # Official itch.io CDN is broth.itch.zone; resolve LATEST, then fetch that build.
          VERSION=$(curl -fsSL --retry 5 --retry-all-errors https://broth.itch.zone/butler/linux-amd64/LATEST)
          curl -fsSL --retry 5 --retry-all-errors -o butler.zip "https://broth.itch.zone/butler/linux-amd64/$VERSION/archive/default"
          unzip -q butler.zip
          chmod +x butler
          ./butler -V
      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: ./butler push dist "${{ vars.ITCH_TARGET }}:html5"
